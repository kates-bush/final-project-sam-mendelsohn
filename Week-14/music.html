    <body>
        <br>
        <h1>Sam Mendelsohn</h1>
        <h4>Music samples - hover to listen!</h4>
        <div>All music produced and mixed by Sam. Mastered by Liz Meier (Tracks 1 and 2).</div>
        <ol>
            <li>Secaydia - Big Strong Man (2026 - Coming Soon)</li>
            <button id="BSM"><img src="Images\BSM.jpg" alt="" width="120px"></button>
            <li>Ladybug - Potential (2025)</li>
            <button id="POT"><img src="Images\POT.jpg" alt="" width="120px"></button>
            <li>Racoon Road - Lost Cause (2025)</li>
            <button id="LOS"><img src="Images\LOS.jpg" alt="" width="120px"></button>
        </ol>
        <script>
            let BSMButton = document.querySelector("#BSM");
        function playBSM() {
            const BSMSound = new Audio("Audio/BIG STRONG MAN_MASTER_1.2.mp3");
            BSMSound.play();
            function stopBSM() {
                BSMSound.pause();
            }
            BSMButton.addEventListener("mouseout", stopBSM);
        }
        BSMButton.addEventListener("mouseover", playBSM);

            let POTButton = document.querySelector("#POT");
        function playPOT() {
            const POTSound = new Audio("Audio/POT.mp3");
            POTSound.play();
            function stopPOT() { 
                POTSound.pause();
            }
            POTButton.addEventListener("mouseout", stopPOT);
        }
        POTButton.addEventListener("mouseover", playPOT);
        
            let LOSButton = document.querySelector("#LOS");
        function playLOS() {
            const LOSSound = new Audio("Audio/Racoon Road - Lost Cause MASTER 48K 091625 (1).mp3");
            LOSSound.play();
            function stopLOS() { 
                LOSSound.pause();
            }
            LOSButton.addEventListener("mouseout", stopLOS);
        }
        LOSButton.addEventListener("mouseover", playLOS);
        </script>
