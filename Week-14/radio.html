    <body>
        <br>
        <h1>Sam Mendelsohn</h1>
        <h4>Radio samples - hover to listen!</h4>
        <div>Aired on WFAN 101.9 FM, 7/13/2025</div>
        <ul>
            <li>WFAN Radio - Ad</li>
            <button id="AD1"><img src="Images\WFANLOGO2.jpg" alt="" width="120px"></button>
            <li>WFAN Radio - Jingle</li>
            <button id="JIN"><img src="Images\WFANLOGO2.jpg" alt="" width="120px"></button>
        </ul>
        <script>
            let AD1Button = document.querySelector("#AD1");
        function playAD1() {
            const AD1Sound = new Audio("Audio/WFANAD.mp3");
            AD1Sound.play();
            function stopAD1() { 
                AD1Sound.pause();
            }
            AD1Button.addEventListener("mouseout", stopAD1);
        }
        AD1Button.addEventListener("mouseover", playAD1);

        let JINButton = document.querySelector("#JIN");
        function playJIN() {
            const JINSound = new Audio("Audio/WFANJINGLE.wav");
            JINSound.play();
            function stopJIN() { 
                JINSound.pause();
            }
            JINButton.addEventListener("mouseout", stopJIN);
        }
        JINButton.addEventListener("mouseover", playJIN);
        </script>
    </body>
